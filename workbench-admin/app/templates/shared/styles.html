<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{background:#1a1d2e;border-bottom:1px solid #2d3148;padding:1rem 2rem;display:flex;align-items:center;gap:1rem}
.logo{font-size:1.2rem;font-weight:700;color:#7c6af7}
.sub{font-size:.78rem;color:#64748b}
.layout{display:flex;height:calc(100vh - 57px)}
nav{width:190px;background:#13151f;border-right:1px solid #2d3148;padding:1.5rem 0;flex-shrink:0}
nav a{display:block;padding:.6rem 1.5rem;color:#94a3b8;text-decoration:none;font-size:.85rem;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
nav a:hover{color:#e2e8f0;background:#1e2235}
nav a.active{color:#7c6af7;border-left-color:#7c6af7;background:#1e2235}
nav .nav-section{padding:.9rem 1.5rem .3rem;font-size:.65rem;color:#4a5568;text-transform:uppercase;letter-spacing:.08em}
main{flex:1;overflow-y:auto;padding:2rem}
.page{display:none}.page.active{display:block}
h2{font-size:1.05rem;font-weight:600;color:#c4b5fd;margin-bottom:1.5rem}
.card{background:#1a1d2e;border:1px solid #2d3148;border-radius:8px;padding:1.5rem;margin-bottom:1.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fg{display:flex;flex-direction:column;gap:.35rem}
label{font-size:.75rem;color:#94a3b8;font-weight:500}
input,select{background:#0f1117;border:1px solid #2d3148;border-radius:6px;color:#e2e8f0;padding:.45rem .7rem;font-size:.85rem;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus{border-color:#7c6af7}
select option{background:#1a1d2e}
.tag-list{background:#0f1117;border:1px solid #2d3148;border-radius:6px;padding:.5rem .7rem;min-height:60px;max-height:140px;overflow-y:auto}
.tag-item{display:flex;align-items:center;gap:.5rem;padding:.2rem 0;font-size:.83rem;cursor:pointer}
.tag-item input[type=checkbox]{width:14px;height:14px;accent-color:#7c6af7;cursor:pointer;flex-shrink:0}
.tag-empty{color:#4a5568;font-size:.78rem;font-style:italic}
.tag-hint{font-size:.7rem;color:#4a5568;margin-top:.2rem}
.btn{padding:.4rem .9rem;border-radius:6px;border:none;font-size:.8rem;font-weight:500;cursor:pointer;transition:opacity .15s;appearance:none;-webkit-appearance:none}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#7c6af7;color:#fff}
.btn-danger{background:#e53e3e;color:#fff}
.btn-ghost{background:#2d3148;color:#94a3b8}
.btn-sm{padding:.25rem .6rem;font-size:.75rem}
.btn-apply{background:#38a169;color:#fff;padding:.6rem 1.8rem;font-size:.9rem}
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin-bottom:1rem}
.pc{background:#1e2235;border:1px solid #2d3148;border-radius:8px;padding:1rem 1.1rem}
.pc .name{font-weight:600;font-size:.9rem;margin-bottom:.2rem}
.pc .grp{font-size:.72rem;color:#7c6af7;background:#2d2860;border-radius:4px;padding:1px 6px;display:inline-block;margin-bottom:.4rem}
.pc .meta{font-size:.76rem;color:#64748b;line-height:1.7}
.pc .imgs{margin-top:.4rem}
.pc .img-badge{display:inline-block;font-size:.68rem;color:#68d391;background:#1a3326;border:1px solid #276749;border-radius:4px;padding:1px 6px;margin:.15rem .1rem}
.pc .repo{font-size:.7rem;color:#4a5568;margin-top:.2rem}
.pc .actions{margin-top:.65rem;display:flex;gap:.4rem}
.status{margin-top:1rem;font-size:.8rem;padding:.65rem .9rem;border-radius:6px;white-space:pre-wrap;font-family:monospace;display:none}
.status.ok{background:#1a3326;color:#68d391;border:1px solid #276749}
.status.err{background:#2d1515;color:#fc8181;border:1px solid #c53030}
.empty{color:#4a5568;font-size:.85rem;text-align:center;padding:2rem}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #7c6af7;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.token-status-box{background:#0f1117;border:1px solid #2d3148;border-radius:6px;padding:1rem 1.2rem;margin-bottom:1.5rem;font-size:.83rem;line-height:1.8}
.ts-label{color:#64748b;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.token-ok{color:#68d391}
.token-err{color:#fc8181}
.token-field-row{display:flex;gap:.7rem;align-items:flex-end}
.token-field-row input{font-family:monospace;font-size:.82rem}
.token-hint{font-size:.7rem;color:#4a5568;margin-top:.5rem}
.log-box{background:#0a0c10;border:1px solid #2d3148;border-radius:6px;padding:.8rem 1rem;min-height:120px;max-height:380px;overflow-y:auto;font-family:'Courier New',monospace;font-size:.76rem;line-height:1.6;color:#a0aec0;white-space:pre-wrap;word-break:break-all}
.log-box .log-ok{color:#68d391}
.log-box .log-err{color:#fc8181}
.log-box .log-step{color:#7c6af7;font-weight:600}
.import-status-badge{display:inline-block;font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:12px;margin-left:.6rem;vertical-align:middle}
.badge-running{background:#2d2860;color:#a78bfa}
.badge-done{background:#1a3326;color:#68d391}
.badge-failed{background:#2d1515;color:#fc8181}
.badge-idle{background:#1e2235;color:#64748b}
.group-card{background:#1e2235;border:1px solid #2d3148;border-radius:8px;margin-bottom:1rem;overflow:hidden}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.1rem;cursor:pointer;user-select:none}
.group-header:hover{background:#252840}
.group-name{font-weight:600;font-size:.9rem}
.group-path{font-size:.72rem;color:#4a5568;margin-left:.5rem}
.group-body{border-top:1px solid #2d3148;padding:.75rem 1.1rem}
.member-row{display:flex;align-items:center;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid #1a1d2e;font-size:.82rem}
.member-row:last-child{border-bottom:none}
.member-name{color:#e2e8f0}
.member-role{font-size:.7rem;color:#7c6af7;background:#2d2860;border-radius:4px;padding:1px 6px;margin-left:.5rem}
.add-member-row{display:flex;gap:.5rem;margin-top:.75rem}
.add-member-row input{flex:1}

/* ── Group filter bar (Profiles tab) ─────────────────────────────────────── */
.filter-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:1.2rem;padding:.75rem 1rem;background:#13151f;border:1px solid #2d3148;border-radius:8px}
.filter-label{font-size:.68rem;color:#4a5568;text-transform:uppercase;letter-spacing:.07em;margin-right:4px;flex-shrink:0}
.filter-pill{appearance:none;-webkit-appearance:none;display:inline-block;padding:4px 16px;border-radius:999px;font-size:.76rem;font-weight:500;font-family:inherit;line-height:1.4;border:1px solid #2d3148;background:transparent;color:#64748b;cursor:pointer;transition:background .15s,border-color .15s,color .15s;white-space:nowrap}
.filter-pill:hover{border-color:#7c6af7;color:#c4b5fd;background:#1e1a3a}
.filter-pill.active{background:#7c6af7;border-color:#7c6af7;color:#fff;font-weight:600}
.filter-count{margin-left:auto;font-size:.72rem;color:#4a5568;flex-shrink:0;padding-left:.5rem}
</style>
