<style>
/* ── Theme variables ──────────────────────────────────────────────────────── */
:root{
  --bg-base:#0f1117;--bg-card:#1a1d2e;--bg-nav:#13151f;--bg-input:#0f1117;
  --bg-hover:#1e2235;--border:#2d3148;--border-subtle:#1a1d2e;
  --text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;--text-faint:#4a5568;
  --accent:#7c6af7;--accent-soft:#2d2860;--accent-text:#a78bfa;--accent-h2:#c4b5fd;
  --success:#68d391;--success-soft:#1a3326;--success-border:#276749;
  --danger:#fc8181;--danger-soft:#2d1515;--danger-border:#c53030;
  --delete-btn:#e53e3e;--apply-btn:#38a169;
  --log-bg:#0a0c10;--log-text:#a0aec0;
  --group-hover:#252840;--member-border:#1a1d2e;
}
[data-theme="light"]{
  --bg-base:#f0f2f8;--bg-card:#ffffff;--bg-nav:#f8f9fc;--bg-input:#ffffff;
  --bg-hover:#eef0f6;--border:#dde1ea;--border-subtle:#eef0f5;
  --text-primary:#1a1a2e;--text-secondary:#4a5568;--text-muted:#718096;--text-faint:#a0aec0;
  --accent:#6c5ce7;--accent-soft:#ede9fe;--accent-text:#5b21b6;--accent-h2:#5b21b6;
  --success:#2e7d32;--success-soft:#e8f5e9;--success-border:#a5d6a7;
  --danger:#c62828;--danger-soft:#ffebee;--danger-border:#ef9a9a;
  --delete-btn:#d32f2f;--apply-btn:#2e7d32;
  --log-bg:#1e1e2e;--log-text:#d4d4d4;
  --group-hover:#eef0f6;--member-border:#eef0f5;
}

/* ── Base ─────────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100vh}

/* ── Header ──────────────────────────────────────────────────────────────── */
header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;transition:background .25s,border-color .25s}
.logo{font-size:1.2rem;font-weight:700;color:var(--accent)}
.sub{font-size:.78rem;color:var(--text-muted)}

/* ── Theme toggle ────────────────────────────────────────────────────────── */
.theme-toggle{margin-left:auto;display:flex;align-items:center;gap:.55rem;cursor:pointer;padding:.3rem .75rem;border-radius:999px;border:1px solid var(--border);background:var(--bg-hover);color:var(--text-secondary);font-size:.78rem;font-weight:500;transition:all .2s;flex-shrink:0}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.toggle-track{width:32px;height:18px;background:var(--border);border-radius:999px;position:relative;transition:background .25s;flex-shrink:0}
[data-theme="light"] .toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:transform .25s}
[data-theme="light"] .toggle-thumb{transform:translateX(14px)}

/* ── Layout ──────────────────────────────────────────────────────────────── */
.layout{display:flex;height:calc(100vh - 57px)}
nav{width:190px;background:var(--bg-nav);border-right:1px solid var(--border);padding:1.5rem 0;flex-shrink:0;transition:background .25s,border-color .25s}
nav a{display:block;padding:.6rem 1.5rem;color:var(--text-secondary);text-decoration:none;font-size:.85rem;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
nav a:hover{color:var(--text-primary);background:var(--bg-hover)}
nav a.active{color:var(--accent);border-left-color:var(--accent);background:var(--bg-hover)}
nav .nav-section{padding:.9rem 1.5rem .3rem;font-size:.65rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em}
main{flex:1;overflow-y:auto;padding:2rem;transition:background .25s}

/* ── Pages ───────────────────────────────────────────────────────────────── */
.page{display:none}.page.active{display:block}
h2{font-size:1.05rem;font-weight:600;color:var(--accent-h2);margin-bottom:1.5rem}

/* ── Cards ───────────────────────────────────────────────────────────────── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-bottom:1.5rem;transition:background .25s,border-color .25s}

/* ── Grid & form fields ─────────────────────────────────────────────────── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fg{display:flex;flex-direction:column;gap:.35rem}
label{font-size:.75rem;color:var(--text-secondary);font-weight:500}
input,select{background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);padding:.45rem .7rem;font-size:.85rem;outline:none;width:100%;transition:border-color .15s,background .25s,color .25s}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg-card);color:var(--text-primary)}

/* ── Tag list ────────────────────────────────────────────────────────────── */
.tag-list{background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;min-height:60px;max-height:140px;overflow-y:auto}
.tag-item{display:flex;align-items:center;gap:.5rem;padding:.2rem 0;font-size:.83rem;cursor:pointer;color:var(--text-primary)}
.tag-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.tag-empty{color:var(--text-faint);font-size:.78rem;font-style:italic}
.tag-hint{font-size:.7rem;color:var(--text-faint);margin-top:.2rem}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{padding:.4rem .9rem;border-radius:6px;border:none;font-size:.8rem;font-weight:500;cursor:pointer;transition:opacity .15s;appearance:none;-webkit-appearance:none}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:var(--delete-btn);color:#fff}
.btn-ghost{background:var(--bg-hover);color:var(--text-secondary)}
.btn-sm{padding:.25rem .6rem;font-size:.75rem}
.btn-apply{background:var(--apply-btn);color:#fff;padding:.6rem 1.8rem;font-size:.9rem}

/* ── Badges ──────────────────────────────────────────────────────────────── */
.badge{font-size:.72rem;font-weight:600;padding:2px 9px;border-radius:999px;display:inline-block}
.b-ok{background:var(--success-soft);color:var(--success);border:1px solid var(--success-border)}
.b-err{background:var(--danger-soft);color:var(--danger);border:1px solid var(--danger-border)}
.b-warn{background:#fff8e1;color:#b45309;border:1px solid #fcd34d}
[data-theme="dark"] .b-warn{background:#2d2a00;color:#fbbf24;border-color:#78620a}
.b-info{background:var(--accent-soft);color:var(--accent-text);border:1px solid var(--accent)}
.b-run{background:var(--accent-soft);color:var(--accent-text);border:1px solid var(--accent)}

/* ── Profile grid ────────────────────────────────────────────────────────── */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin-bottom:1rem}
.pc{background:var(--bg-hover);border:1px solid var(--border);border-radius:8px;padding:1rem 1.1rem;transition:background .25s,border-color .25s}
.pc .name{font-weight:600;font-size:.9rem;color:var(--text-primary);margin-bottom:.2rem}
.pc .grp{font-size:.72rem;color:var(--accent);background:var(--accent-soft);border-radius:4px;padding:1px 6px;display:inline-block;margin-bottom:.4rem}
.pc .meta{font-size:.76rem;color:var(--text-muted);line-height:1.7}
.pc .imgs{margin-top:.4rem}
.pc .img-badge{display:inline-block;font-size:.68rem;color:var(--success);background:var(--success-soft);border:1px solid var(--success-border);border-radius:4px;padding:1px 6px;margin:.15rem .1rem}
.pc .repo{font-size:.7rem;color:var(--text-faint);margin-top:.2rem}
.pc .actions{margin-top:.65rem;display:flex;gap:.4rem}

/* ── Status ──────────────────────────────────────────────────────────────── */
.status{margin-top:1rem;font-size:.8rem;padding:.65rem .9rem;border-radius:6px;white-space:pre-wrap;font-family:monospace;display:none}
.status.ok{background:var(--success-soft);color:var(--success);border:1px solid var(--success-border)}
.status.err{background:var(--danger-soft);color:var(--danger);border:1px solid var(--danger-border)}
.empty{color:var(--text-faint);font-size:.85rem;text-align:center;padding:2rem}

/* ── Spinner ─────────────────────────────────────────────────────────────── */
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Token / Settings ────────────────────────────────────────────────────── */
.token-status-box{background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:1rem 1.2rem;margin-bottom:1.5rem;font-size:.83rem;line-height:1.8}
.ts-label{color:var(--text-muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.token-ok{color:var(--success)}
.token-err{color:var(--danger)}
.token-field-row{display:flex;gap:.7rem;align-items:flex-end}
.token-field-row input{font-family:monospace;font-size:.82rem}
.token-hint{font-size:.7rem;color:var(--text-faint);margin-top:.5rem}
.token-use-card{display:flex;align-items:flex-start;gap:.75rem;background:var(--bg-hover);border:1px solid var(--border);border-radius:7px;padding:.75rem 1rem;transition:background .25s}
.tuc-icon{font-size:1.3rem;flex-shrink:0;margin-top:1px}
.tuc-title{font-size:.8rem;font-weight:600;color:var(--text-primary);margin-bottom:.2rem}
.tuc-desc{font-size:.72rem;color:var(--text-muted);line-height:1.5}

/* ── Log box ─────────────────────────────────────────────────────────────── */
.log-box{background:var(--log-bg);border:1px solid var(--border);border-radius:6px;padding:.8rem 1rem;min-height:120px;max-height:380px;overflow-y:auto;font-family:'Courier New',monospace;font-size:.76rem;line-height:1.6;color:var(--log-text);white-space:pre-wrap;word-break:break-all}
.log-box .log-ok{color:var(--success)}
.log-box .log-err{color:var(--danger)}
.log-box .log-step{color:var(--accent);font-weight:600}

/* ── Import badges ───────────────────────────────────────────────────────── */
.import-status-badge{display:inline-block;font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:12px;margin-left:.6rem;vertical-align:middle}
.badge-running{background:var(--accent-soft);color:var(--accent-text)}
.badge-done{background:var(--success-soft);color:var(--success)}
.badge-failed{background:var(--danger-soft);color:var(--danger)}
.badge-idle{background:var(--bg-hover);color:var(--text-muted)}

/* ── Groups ──────────────────────────────────────────────────────────────── */
.group-card{background:var(--bg-hover);border:1px solid var(--border);border-radius:8px;margin-bottom:1rem;overflow:hidden;transition:background .25s,border-color .25s}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.1rem;cursor:pointer;user-select:none;transition:background .15s}
.group-header:hover{background:var(--group-hover)}
.group-name{font-weight:600;font-size:.9rem;color:var(--text-primary)}
.group-path{font-size:.72rem;color:var(--text-faint);margin-left:.5rem}
.group-body{border-top:1px solid var(--border);padding:.75rem 1.1rem}
.member-row{display:flex;align-items:center;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--member-border);font-size:.82rem}
.member-row:last-child{border-bottom:none}
.member-name{color:var(--text-primary)}
.member-role{font-size:.7rem;color:var(--accent);background:var(--accent-soft);border-radius:4px;padding:1px 6px;margin-left:.5rem}
.add-member-row{display:flex;gap:.5rem;margin-top:.75rem}
.add-member-row input{flex:1}

/* ── Filter bar ──────────────────────────────────────────────────────────── */
.filter-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:1.2rem;padding:.75rem 1rem;background:var(--bg-nav);border:1px solid var(--border);border-radius:8px;transition:background .25s,border-color .25s}
.filter-label{font-size:.68rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.07em;margin-right:4px;flex-shrink:0}
.filter-pill{appearance:none;-webkit-appearance:none;display:inline-block;padding:4px 16px;border-radius:999px;font-size:.76rem;font-weight:500;font-family:inherit;line-height:1.4;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:background .15s,border-color .15s,color .15s;white-space:nowrap}
.filter-pill:hover{border-color:var(--accent);color:var(--accent-h2);background:var(--accent-soft)}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.filter-count{margin-left:auto;font-size:.72rem;color:var(--text-faint);flex-shrink:0;padding-left:.5rem}

/* ── Dot status ──────────────────────────────────────────────────────────── */
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);display:inline-block;flex-shrink:0}
.dot.ok{background:var(--success)}
.dot.running{background:var(--accent);animation:pulse 1s infinite}
.dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── GPU policy modal ────────────────────────────────────────────────────── */
.log-box-dark{background:#0a0c10;border:1px solid var(--border);border-radius:6px;padding:.8rem 1rem;font-family:monospace;font-size:.76rem;color:#a0aec0;line-height:1.6;max-height:300px;overflow-y:auto;white-space:pre-wrap}
</style>
