<script>
function nav(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'groups')     onGroupsPageShow();
  if (name === 'users')      onUsersPageShow();
  if (name === 'profiles')   loadProfiles();
  if (name === 'new')        { loadGroups(); loadRepos(); }
  if (name === 'settings')   { loadTokenStatus(); loadSettingsInfo(); }
  if (name === 'images')     { loadImportRepos(); loadRegistryImages(); }
  // Single entry point — sequences status + policy + groups with no race condition
  if (name === 'gpu')        { if (typeof initGpuTab       === 'function') initGpuTab(); }
  if (name === 'gpu-policy') { if (typeof initGpuPolicyTab === 'function') initGpuPolicyTab(); }
}

function showMsg(el, text, ok) {
  el.textContent   = text;
  el.style.color   = ok ? '#68d391' : '#fc8181';
  el.style.display = text ? 'inline' : 'none';
  if (ok && text) setTimeout(() => el.style.display = 'none', 5000);
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', () => {
  loadProfiles();
  const nameInput = document.getElementById('f-name');
  if (nameInput) {
    nameInput.addEventListener('input', function() {
      document.getElementById('f-slug').value = this.value
        .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,48);
    });
  }
});
</script>
