# ansible-dashboard variables — example for manual use
# When using the launcher, these are generated into generated/dashboard-vars.yml

dashboard_user:         "REPLACE_WITH_CP_SSH_USER"
dashboard_http_user:    "admin"
dashboard_http_pass:    "REPLACE_WITH_PASSWORD"
dashboard_gitlab_token: "REPLACE_FROM_secrets.env"
dashboard_port:         8888
workbench_repo:         "https://gitkube.deslabcloud.com/AI-workbench/k8s-launcher.git"
jhub_gitlab_url:        "REPLACE_WITH_GITLAB_URL"
jhub_registry_host:     "REPLACE_WITH_REGISTRY_HOST"
jhub_registry_namespace: "registry/notebook-images"
notebook_images_project_id: 1
