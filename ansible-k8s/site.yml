---
- hosts: all
  become: yes
  roles: [common, node_prep, containerd, kubernetes_packages]

- hosts: control_plane
  become: yes
  roles: [control_plane]

- hosts: control_plane
  become: no
  roles: [calico]

- hosts: workers
  become: yes
  roles: [workers]

- hosts: control_plane
  become: no
  roles: [validation]

# Hardening runs last — after cluster is validated and all nodes are Ready.
# Adds deletion protection, fixes typha placement, and saves artifacts.
- hosts: control_plane
  become: no
  roles: [harden]
