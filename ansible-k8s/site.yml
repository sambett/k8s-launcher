---
- hosts: all
  become: yes
  roles: [common, containerd, kubernetes_packages]

- hosts: control_plane
  become: yes
  roles: [control_plane]

- hosts: control_plane
  become: no
  roles: [calico]

- hosts: workers
  become: yes
  roles: [workers]

- hosts: control_plane
  become: no
  roles: [validation]

# Hardening runs last, after the cluster is validated and all nodes are Ready.
# It now focuses on recovery artifacts such as PKI backup and etcd snapshot.
- hosts: control_plane
  become: no
  roles: [harden]
