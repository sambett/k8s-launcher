---
- hosts: all
  become: yes
  roles: [common, node_prep, containerd, kubernetes_packages]

- hosts: control_plane
  become: yes
  roles: [control_plane]

- hosts: control_plane
  become: no
  roles: [calico]

- hosts: workers
  become: yes
  roles: [workers]

- hosts: control_plane
  become: no
  roles: [validation]
