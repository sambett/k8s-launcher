---
# Shared node preparation for both control plane and workers.
# This role covers the OS-level setup from the reference scripts:
# packages, hostname resolution, swap removal, kernel modules, sysctl,
# storage prerequisites, and kubelet node IP configuration.

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  apt:
    # nfs-common and open-iscsi are installed early because Longhorn depends
    # on host storage tooling being present later in the platform flow.
    name: [apt-transport-https, ca-certificates, curl, gpg, socat, openssh-server, open-iscsi, nfs-common]
    state: present

- name: Populate /etc/hosts with cluster nodes
  lineinfile:
    path: /etc/hosts
    line: "{{ item.ip }} {{ item.name }}"
    regexp: "^{{ item.ip }}\\s"
  loop: "{{ cluster_hosts }}"

- name: Generate SSH key pair if missing
  openssh_keypair:
    path: "/home/{{ ansible_user }}/.ssh/id_rsa"
    type: rsa
    size: 4096
    state: present
  become: no

- name: Collect this node's public key
  slurp:
    src: "/home/{{ ansible_user }}/.ssh/id_rsa.pub"
  register: node_pubkey
  become: no

- name: Push all node public keys to this node
  authorized_key:
    user: "{{ ansible_user }}"
    state: present
    key: "{{ hostvars[item]['node_pubkey']['content'] | b64decode }}"
  loop: "{{ groups['all'] | difference([inventory_hostname]) }}"

- name: Write ~/.ssh/config for cluster hosts
  blockinfile:
    path: "/home/{{ ansible_user }}/.ssh/config"
    create: yes
    mode: '0600'
    marker: "# {mark} ANSIBLE MANAGED"
    block: |
      {% for h in cluster_hosts %}
      Host {{ h.name }}
        HostName {{ h.ip }}
        StrictHostKeyChecking no
      {% endfor %}
  become: no

# Kubernetes expects swap to be disabled. Keeping swap on can break kubelet
# preflight checks and makes resource handling less predictable.
- name: Disable swap now
  command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: ansible_swaptotal_mb > 0

- name: Remove swap from /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '#\1'

- name: Delete swapfile
  file:
    path: /swapfile
    state: absent

# These kernel/network settings come from the same preparation sequence as the
# reference scripts. They let containers and kube-proxy see pod traffic properly.
- name: Load overlay module
  modprobe:
    name: overlay
    state: present

- name: Load br_netfilter module
  modprobe:
    name: br_netfilter
    state: present

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/kubernetes.conf
    content: "overlay\nbr_netfilter\n"

- name: Set required sysctl params
  copy:
    dest: /etc/sysctl.d/kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: Apply sysctl
  command: sysctl --system
  changed_when: false

# On some VMs kubelet may pick the wrong interface automatically.
# Writing --node-ip makes node registration more predictable.
- name: Set kubelet node IP fact
  set_fact:
    kubelet_node_ip: "{{ ansible_default_ipv4.address }}"

- name: Ensure /etc/default exists
  file:
    path: /etc/default
    state: directory
    mode: "0755"

- name: Configure kubelet node IP
  copy:
    dest: /etc/default/kubelet
    content: |
      KUBELET_EXTRA_ARGS=--node-ip={{ kubelet_node_ip }}
    mode: "0644"

# Longhorn uses iSCSI on the host, so we enable the service now as part of
# shared node preparation instead of waiting until the storage playbooks run.
- name: Enable iscsid
  systemd:
    name: iscsid
    enabled: yes
    state: started
