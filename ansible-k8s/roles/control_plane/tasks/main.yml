---
# Control plane bootstrap.
# Keep this role simple and close to the working kubeadm flow from the
# reference scripts, while adding two protections:
#   1. do not silently trust a stale admin.conf
#   2. print useful diagnostics when bootstrap fails

- name: Create artifact directory
  file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: "0750"
    owner: "{{ ansible_user }}"
  become: yes

- name: Show control plane bootstrap policy
  debug:
    msg:
      - "This launcher bootstraps only brand new Kubernetes nodes."
      - "Fresh node: install."
      - "Partial or broken bootstrap state: recovery handling will be used."
      - "Healthy existing Kubernetes control plane: stop without changing it."

- name: Write kubeadm config from template
  template:
    src: kubeadm-config.yaml.j2
    dest: "{{ artifacts_dir }}/kubeadm-config.yaml"
    mode: "0640"
    owner: "{{ ansible_user }}"
  become: yes

- name: Check if admin.conf already exists
  stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf
  become: yes

# admin.conf on disk is not enough to prove the control plane is healthy.
# If the file exists but /readyz fails, stop immediately and ask for cleanup
# instead of trying to repair automatically.
- name: Check whether existing API server is reachable
  command: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
  register: apiserver_readyz
  changed_when: false
  failed_when: false
  become: yes
  when: admin_conf.stat.exists

# Explicitly separate three states:
# - fresh: no admin.conf, so normal bootstrap can proceed
# - healthy: admin.conf exists and readyz succeeds, so this launcher must stop
# - partial: leftovers exist but health is not proven, so recovery will own it
- name: Classify control plane bootstrap state
  set_fact:
    control_plane_bootstrap_state: >-
      {{ 'fresh'
         if not admin_conf.stat.exists else
         ('healthy' if apiserver_readyz.rc == 0 else 'partial') }}

- name: Show detected control plane bootstrap state
  debug:
    msg: "Detected control plane bootstrap state: {{ control_plane_bootstrap_state }}"

# A healthy cluster is never reset automatically by this bootstrap-only launcher.
- name: Stop on healthy existing control plane
  fail:
    msg: |
      A healthy Kubernetes control plane already exists on this node.
      This launcher only creates a brand new cluster and will not modify an
      existing healthy cluster.

      No cleanup was performed.
      Use a separate lifecycle, upgrade, or reset workflow if you intend to
      replace this cluster.
  when: control_plane_bootstrap_state == 'healthy'

# Partial state is recoverable because health was not proven. Clean the node,
# then continue through the same fresh bootstrap path below.
- name: Recover partial control plane leftovers
  include_role:
    name: recovery
  vars:
    recovery_node_role: control_plane
  when: control_plane_bootstrap_state == 'partial'

- name: Reclassify recovered control plane as fresh
  set_fact:
    control_plane_bootstrap_state: fresh
  when: control_plane_bootstrap_state == 'partial'

# Keep the working bootstrap path untouched for fresh nodes.
- name: Pre-pull control plane images
  command: kubeadm config images pull --kubernetes-version {{ k8s_version }}
  become: yes
  when: control_plane_bootstrap_state == 'fresh'

- block:
    - name: Run kubeadm init
      shell: >
        kubeadm init
        --config {{ artifacts_dir }}/kubeadm-config.yaml
        --upload-certs
        2>&1 | tee {{ artifacts_dir }}/kubeadm-init.log
      become: yes

    # Wait for the HTTPS socket first, then for the readyz endpoint.
    # This gives clearer failure signals than jumping straight to kubectl.
    - name: Wait for kube-apiserver HTTPS port to open
      wait_for:
        host: "{{ cp_ip }}"
        port: "{{ api_port }}"
        delay: 5
        timeout: 180

    - name: Wait for kube-apiserver to become ready
      command: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
      register: readyz_after_init
      retries: 24
      delay: 10
      until: readyz_after_init.rc == 0
      changed_when: false
      become: yes
  when: control_plane_bootstrap_state == 'fresh'

  rescue:
    - name: Read kubeadm init log if present
      shell: test -f {{ artifacts_dir }}/kubeadm-init.log && cat {{ artifacts_dir }}/kubeadm-init.log || true
      register: kubeadm_init_log
      changed_when: false
      become: yes

    - name: Read kubelet service status
      shell: systemctl status kubelet --no-pager -l || true
      register: kubelet_status
      changed_when: false
      become: yes

    - name: Read recent kubelet journal
      shell: journalctl -u kubelet -n 80 --no-pager || true
      register: kubelet_journal
      changed_when: false
      become: yes

    - name: Read recent containerd journal
      shell: journalctl -u containerd -n 80 --no-pager || true
      register: containerd_journal
      changed_when: false
      become: yes

    - name: List static pod manifests
      shell: ls -la /etc/kubernetes/manifests 2>&1 || true
      register: manifest_list
      changed_when: false
      become: yes

    - name: Show kubeadm init log
      debug:
        msg: "{{ kubeadm_init_log.stdout_lines }}"

    - name: Show kubelet status
      debug:
        msg: "{{ kubelet_status.stdout_lines }}"

    - name: Show kubelet journal
      debug:
        msg: "{{ kubelet_journal.stdout_lines }}"

    - name: Show containerd journal
      debug:
        msg: "{{ containerd_journal.stdout_lines }}"

    - name: Show static pod manifests
      debug:
        msg: "{{ manifest_list.stdout_lines }}"

    - name: Fail after printing bootstrap diagnostics
      fail:
        msg: "Control plane bootstrap failed. Diagnostic logs were printed above."

- name: Ensure root kubeconfig directory exists
  file:
    path: /root/.kube
    state: directory
    mode: "0700"
  become: yes

- name: Copy admin.conf to root kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes
    mode: "0600"
  become: yes

- name: Create .kube directory for ansible user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    mode: "0750"
    owner: "{{ ansible_user }}"
  become: yes

- name: Copy admin.conf to ansible user kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    mode: "0600"
  become: yes

# Generate a fresh worker join command every run and save it for the worker role.
- name: Generate worker join command via kubeadm
  shell: kubeadm token create --print-join-command 2>/dev/null
  register: join_cmd
  become: yes
  changed_when: true

- name: Write join command to artifacts
  copy:
    content: "{{ join_cmd.stdout }}\n"
    dest: "{{ join_command_file }}"
    owner: "{{ ansible_user }}"
    mode: "0600"
  become: yes
