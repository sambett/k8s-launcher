---
- name: Create artifact directory
  file:
    path: "{{ artifacts_dir }}"
    state: directory
    mode: '0750'
    owner: "{{ ansible_user }}"
  become: yes

- name: Write kubeadm config from template
  template:
    src: kubeadm-config.yaml.j2
    dest: "{{ artifacts_dir }}/kubeadm-config.yaml"
    mode: '0640'
    owner: "{{ ansible_user }}"
  become: yes

- name: Check if control plane is already initialised
  stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf
  become: yes

- name: Pre-pull control plane images
  command: kubeadm config images pull --kubernetes-version {{ k8s_version }}
  become: yes
  when: not admin_conf.stat.exists

- name: Run kubeadm init
  shell: >
    kubeadm init
    --config {{ artifacts_dir }}/kubeadm-config.yaml
    --upload-certs
    2>&1 | tee {{ artifacts_dir }}/kubeadm-init.log
  when: not admin_conf.stat.exists
  become: yes
  async: 600
  poll: 30

- name: Create .kube directory for user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    mode: '0750'
    owner: "{{ ansible_user }}"
  become: yes

- name: Copy admin.conf to user kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    mode: '0600'
  become: yes

- name: Wait for kube-apiserver to become reachable
  shell: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
  register: apiserver_ready
  become: yes
  retries: 18
  delay: 10
  until: apiserver_ready.rc == 0 and 'ok' in apiserver_ready.stdout
  changed_when: false

- name: Generate worker join command via kubeadm
  command: kubeadm token create --print-join-command
  register: join_cmd
  become: yes
  changed_when: true

- name: Write join command to artifacts
  copy:
    content: "{{ join_cmd.stdout }}\n"
    dest: "{{ join_command_file }}"
    owner: "{{ ansible_user }}"
    mode: '0600'
  become: yes
