---
- name: Disable swap now
  command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: ansible_swaptotal_mb > 0

- name: Remove swap from /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '#\1'

- name: Delete swapfile
  file:
    path: /swapfile
    state: absent

- name: Load overlay module
  modprobe:
    name: overlay
    state: present

- name: Load br_netfilter module
  modprobe:
    name: br_netfilter
    state: present

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/kubernetes.conf
    content: "overlay\nbr_netfilter\n"

- name: Set required sysctl params
  copy:
    dest: /etc/sysctl.d/kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: Apply sysctl
  command: sysctl --system
  changed_when: false

- name: Install Longhorn prerequisites
  apt:
    name: [open-iscsi, nfs-common]
    state: present

- name: Enable iscsid
  systemd:
    name: iscsid
    enabled: yes
    state: started
