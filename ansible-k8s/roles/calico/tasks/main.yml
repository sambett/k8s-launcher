---
# Calico network installation.
# Keep this as a separate role after kubeadm init so the flow stays clear:
#   control plane first, cluster networking second.
# This follows the same spirit as the reference scripts:
# download/apply the manifests, then wait until pods and nodes are healthy.

- name: Create Calico artifact directory
  file:
    path: "{{ artifacts_dir }}/calico"
    state: directory
    mode: "0750"

# We keep the operator-based install because it fits the current codebase
# better than a single giant calico.yaml, but the flow stays simple:
# operator manifest + custom-resources manifest.
- name: Download Tigera operator manifest
  get_url:
    url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml"
    dest: "{{ artifacts_dir }}/calico/tigera-operator.yaml"
    force: no

- name: Download Calico custom resources manifest
  get_url:
    url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/custom-resources.yaml"
    dest: "{{ artifacts_dir }}/calico/custom-resources.yaml"
    force: no

# The pod CIDR in Calico must match the pod network chosen for kubeadm.
- name: Set Calico pod CIDR
  replace:
    path: "{{ artifacts_dir }}/calico/custom-resources.yaml"
    regexp: 'cidr:.*'
    replace: "cidr: {{ pod_cidr }}"

- name: Apply Tigera operator manifest
  # The Tigera operator manifest contains large CRDs. Plain client-side
  # kubectl apply can fail because it stores a huge last-applied annotation.
  # Server-side apply avoids that annotation-size limit.
  command: kubectl apply --server-side -f {{ artifacts_dir }}/calico/tigera-operator.yaml
  changed_when: false


- name: Wait for Tigera operator rollout
  command: kubectl rollout status deployment tigera-operator -n tigera-operator --timeout=120s
  changed_when: false

- name: Apply Calico custom resources
  command: kubectl apply -f {{ artifacts_dir }}/calico/custom-resources.yaml
  changed_when: false

# First wait until Calico pods exist, then wait until they are ready.
# This gives clearer progress than jumping straight to a ready check.
- name: Wait for Calico pods to appear
  shell: kubectl get pods -n calico-system --no-headers 2>/dev/null | wc -l
  register: calico_pod_count
  retries: 12
  delay: 15
  until: calico_pod_count.stdout | int > 0
  changed_when: false

- name: Wait for Calico pods to become Ready
  command: kubectl wait pod --all -n calico-system --for=condition=Ready --timeout=300s
  changed_when: false

# The control-plane node usually becomes Ready only after the CNI is healthy.
- name: Wait for control plane node to become Ready
  command: kubectl wait node {{ cp_hostname }} --for=condition=Ready --timeout=120s
  changed_when: false
