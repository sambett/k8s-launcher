---
# Worker node join.
# This role stays close to the working worker flow you shared, but keeps two
# improvements from the current codebase:
#   1. join command is read from the control plane artifacts directory
#   2. node resolution is done by InternalIP, which is more reliable than
#      assuming the inventory name always matches the Kubernetes node name
#
# It now follows the same bootstrap-only policy as the control plane:
#   - fresh node: join
#   - partial leftovers: recover and rejoin
#   - healthy existing joined node: stop without changing it

- name: Show worker bootstrap policy
  debug:
    msg:
      - "This launcher bootstraps only brand new Kubernetes nodes."
      - "Fresh worker: join."
      - "Partial or broken worker state: recovery handling will be used."
      - "Healthy existing joined worker: stop without changing it."

- name: Check if this node already joined
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

# Before deciding whether this worker is healthy, confirm whether kubelet is
# actually active. If kubelet.conf exists but kubelet is down, this falls into
# partial state and recovery will own it.
- name: Check whether kubelet is active
  command: systemctl is-active kubelet
  register: kubelet_active
  changed_when: false
  failed_when: false
  when: kubelet_conf.stat.exists

- name: Check whether worker is registered in the cluster
  shell: >-
    kubectl get nodes
    -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.conditions[?(@.type=="Ready")].status}{"\t"}{.status.addresses[?(@.type=="InternalIP")].address}{"\n"}{end}'
    | grep '{{ ansible_host }}'
  register: worker_cluster_registration
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no
  changed_when: false
  failed_when: false
  when:
    - kubelet_conf.stat.exists
    - kubelet_active.stdout is defined
    - kubelet_active.stdout == "active"

# Explicitly separate three states:
# - fresh: no kubelet.conf, so normal join can proceed
# - healthy: kubelet is active and this host is already registered as Ready
# - partial: leftovers exist but healthy cluster membership is not proven
- name: Classify worker bootstrap state
  set_fact:
    worker_bootstrap_state: >-
      {{ 'fresh'
         if not kubelet_conf.stat.exists else
         ('healthy'
           if (kubelet_active.stdout is defined
               and kubelet_active.stdout == 'active'
               and worker_cluster_registration.rc == 0
               and '\tTrue\t' in worker_cluster_registration.stdout)
           else 'partial') }}

- name: Show detected worker bootstrap state
  debug:
    msg: "Detected worker bootstrap state: {{ worker_bootstrap_state }}"

# A healthy joined worker is never reset automatically by this bootstrap-only launcher.
- name: Stop on healthy existing worker
  fail:
    msg: |
      This worker is already joined to a healthy Kubernetes cluster.
      This launcher only joins brand new worker nodes and will not reset a
      healthy existing node automatically.

      No cleanup was performed.
      Use a separate worker reset or cluster lifecycle workflow if you intend
      to replace this node.
  when: worker_bootstrap_state == 'healthy'

# Partial state is recoverable because healthy cluster membership was not
# proven. Clean the node, then continue through the same fresh join path below.
- name: Recover partial worker leftovers
  include_role:
    name: recovery
  vars:
    recovery_node_role: worker
  when: worker_bootstrap_state == 'partial'

- name: Reclassify recovered worker as fresh
  set_fact:
    worker_bootstrap_state: fresh
  when: worker_bootstrap_state == 'partial'

# Align the machine hostname before the first join so kubelet registers a
# predictable node name. This follows the reference worker playbook.
- name: Set system hostname to match inventory name
  hostname:
    name: "{{ inventory_hostname | lower }}"
  when: worker_bootstrap_state == 'fresh'

- name: Ensure /etc/hostname is correct
  copy:
    dest: /etc/hostname
    content: "{{ inventory_hostname | lower }}\n"
    mode: "0644"
  when: worker_bootstrap_state == 'fresh'

- name: Update 127.0.1.1 entry for worker hostname
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1 {{ inventory_hostname | lower }}"
    state: present
  when: worker_bootstrap_state == 'fresh'

# Read the fresh join command saved by the control-plane role.
- name: Read saved join command from control plane
  slurp:
    src: "{{ join_command_file }}"
  register: join_command_b64
  delegate_to: "{{ groups['control_plane'][0] }}"
  when: worker_bootstrap_state == 'fresh'

# Append --node-name explicitly so the join remains stable even if a VM was
# originally provisioned with a different cloud-init hostname.
- block:
    - name: Run join command
      shell: "{{ join_command_b64.content | b64decode | trim }} --node-name {{ inventory_hostname | lower }}"
      become: yes

  rescue:
    - name: Read kubelet service status after join failure
      shell: systemctl status kubelet --no-pager -l || true
      register: kubelet_status
      changed_when: false
      become: yes

    - name: Read recent kubelet journal after join failure
      shell: journalctl -u kubelet -n 80 --no-pager || true
      register: kubelet_journal
      changed_when: false
      become: yes

    - name: Show kubelet status
      debug:
        msg: "{{ kubelet_status.stdout_lines }}"

    - name: Show kubelet journal
      debug:
        msg: "{{ kubelet_journal.stdout_lines }}"

    - name: Fail after printing worker join diagnostics
      fail:
        msg: "Worker join failed. Diagnostic logs were printed above."
  when: worker_bootstrap_state == 'fresh'

# Resolve the actual Kubernetes node name by matching InternalIP.
# This is more robust than trusting inventory_hostname directly.
- name: Resolve actual Kubernetes node name for this host
  shell: >-
    kubectl get nodes
    -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.addresses[?(@.type=="InternalIP")].address}{"\n"}{end}'
    | grep '{{ ansible_host }}'
    | awk '{print $1}'
  register: k8s_node_name
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no
  retries: 12
  delay: 15
  until: k8s_node_name.rc == 0 and k8s_node_name.stdout != ""
  changed_when: false

# Apply the standard worker role label.
- name: Label node as worker
  command: >
    kubectl label node {{ k8s_node_name.stdout }}
    node-role.kubernetes.io/worker=worker --overwrite
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no

# Longhorn later expects this label to create the node's default disk entry.
- name: Label node for Longhorn default disk creation
  command: >
    kubectl label node {{ k8s_node_name.stdout }}
    node.longhorn.io/create-default-disk=true --overwrite
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no
