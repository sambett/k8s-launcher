---
# FIX 3: worker labeling resolves actual K8s node name by IP address
# instead of assuming inventory_hostname matches the VM hostname.
# FIX 3b: label task runs on every play — not just on first join —
# so a failed labeling step is corrected automatically on re-run.

- name: Check if this node already joined
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Assert VM hostname matches inventory name (catches misconfigured VMs early)
  assert:
    that: ansible_hostname == inventory_hostname | lower
    fail_msg: >
      VM hostname '{{ ansible_hostname }}' does not match inventory name
      '{{ inventory_hostname | lower }}'. Fix with:
      sudo hostnamectl set-hostname {{ inventory_hostname | lower }}
      Then reboot and re-run.
    success_msg: "Hostname check passed: {{ ansible_hostname }}"
  when: not kubelet_conf.stat.exists

- name: Read saved join command from control plane
  slurp:
    src: "{{ join_command_file }}"
  register: join_command_b64
  delegate_to: "{{ groups['control_plane'][0] }}"
  when: not kubelet_conf.stat.exists

- name: Run join command
  shell: "{{ join_command_b64.content | b64decode | trim }}"
  become: yes
  when: not kubelet_conf.stat.exists

# Resolve actual K8s node name by matching node IP via jsonpath + grep.
# Runs on every play (no when guard) so labeling is always corrected.
# Retries 6x / 10s delay to allow kubelet registration to complete after join.
- name: Resolve actual Kubernetes node name for this host
  shell: >-
    kubectl get nodes
    -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.addresses[?(@.type=="InternalIP")].address}{"\n"}{end}'
    | grep '{{ ansible_host }}'
    | awk '{print $1}'
  register: k8s_node_name
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no
  retries: 6
  delay: 10
  until: k8s_node_name.rc == 0 and k8s_node_name.stdout != ""
  changed_when: false

- name: Label node as worker
  command: >
    kubectl label node {{ k8s_node_name.stdout }}
    node-role.kubernetes.io/worker=worker --overwrite
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no

# Configure insecure GitLab registry so new workers can pull images immediately.
# Only runs when gitlab_registry_host is passed in (post-GitLab installs).
- name: Create containerd certs.d directory for GitLab registry
  file:
    path: "/etc/containerd/certs.d/{{ gitlab_registry_host }}"
    state: directory
    mode: "0755"
  when: gitlab_registry_host is defined and gitlab_registry_host != ''

- name: Write hosts.toml for insecure GitLab registry
  copy:
    dest: "/etc/containerd/certs.d/{{ gitlab_registry_host }}/hosts.toml"
    content: |
      server = "http://{{ gitlab_registry_host }}"

      [host."http://{{ gitlab_registry_host }}"]
        capabilities = ["pull", "resolve", "push"]
        skip_verify = true
    mode: "0644"
  when: gitlab_registry_host is defined and gitlab_registry_host != ''
  register: worker_hosts_toml

- name: Restart containerd if registry config changed
  systemd:
    name: containerd
    state: restarted
    daemon_reload: yes
  when:
    - gitlab_registry_host is defined and gitlab_registry_host != ''
    - worker_hosts_toml.changed
