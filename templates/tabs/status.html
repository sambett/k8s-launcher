<div id="tab-status" class="panel">

  <div class="card">
    <h2>Platform Overview</h2>
    <p class="card-hint">
      Live health check of all deployed components.
      Green means the component is running and reachable from this machine.
    </p>
    <div id="platform-overview">
      <span style="color:#888;font-size:13px">Loading...</span>
    </div>
    <button class="btn btn-sm" style="margin-top:.75rem"
      onclick="refreshPlatformOverview()">↺ Refresh</button>
  </div>

  <div class="card">
    <h2>kubeconfig</h2>
    <p class="card-hint">
      Download this file to manage the cluster from your local machine.
      Copy to <span class="mono">~/.kube/config</span>, then run
      <span class="mono">kubectl get nodes</span> to verify.
    </p>
    <a href="/api/status/kubeconfig" download="kubeconfig.yaml">
      <button class="btn btn-success">⬇ Download kubeconfig.yaml</button>
    </a>
  </div>

</div>
