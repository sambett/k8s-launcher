<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}

/* ── Header ── */
header{background:#1565c0;padding:.75rem 1.5rem;display:flex;align-items:center;gap:10px}
header h1{font-size:1rem;font-weight:600;color:#fff}
header .badge{margin-left:auto}

/* ── Progress stepper ── */
.stepper{background:#fff;border-bottom:1px solid #e0e0e0;padding:.75rem 1.5rem;
         display:flex;align-items:center;gap:0;overflow-x:auto}
.step{display:flex;align-items:center;gap:6px;padding:.4rem .9rem;cursor:pointer;
      border-radius:20px;font-size:12px;font-weight:500;color:#999;
      white-space:nowrap;transition:all .15s;border:none;background:none}
.step:hover{background:#f0f0f0;color:#333}
.step.active{background:#e3f2fd;color:#1565c0}
.step.done{color:#2e7d32}
.step.error{color:#c62828}
.step-num{width:20px;height:20px;border-radius:50%;background:#e0e0e0;
           display:flex;align-items:center;justify-content:center;
           font-size:11px;font-weight:700;flex-shrink:0}
.step.active .step-num{background:#1565c0;color:#fff}
.step.done .step-num{background:#4caf50;color:#fff}
.step.error .step-num{background:#f44336;color:#fff}
.step-arrow{color:#ccc;font-size:16px;flex-shrink:0}

/* ── Tabs (hidden — stepper replaces visual tabs) ── */
.tabs{display:none}
.panel{display:none;max-width:900px;margin:1.5rem auto;padding:0 1rem}
.panel.active{display:block}

/* ── Cards ── */
.card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;
      padding:1.25rem;margin-bottom:1rem}
.card h2{font-size:.875rem;font-weight:600;margin-bottom:.4rem;color:#333}
.card-hint{font-size:12px;color:#888;margin-bottom:.9rem;line-height:1.6;
           padding:.5rem .75rem;background:#fafafa;border-radius:4px;
           border-left:3px solid #90caf9}

/* ── Prereq banner ── */
.prereq-banner{display:none;background:#fff3e0;border:1px solid #ffcc02;
               border-radius:6px;padding:.6rem 1rem;font-size:12px;
               color:#e65100;margin-bottom:1rem;align-items:center;gap:8px}
.prereq-banner.visible{display:flex}
.prereq-banner a{color:#1565c0;cursor:pointer;text-decoration:underline;
                 background:none;border:none;font-size:12px;padding:0}

/* ── Fields ── */
.field-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.field-row label{font-size:12px;color:#666;min-width:160px;flex-shrink:0}
input[type=text],input[type=password],input[type=number]{
  border:1px solid #ddd;border-radius:4px;padding:5px 9px;
  font-size:13px;flex:1;min-width:0;font-family:inherit}
input:focus{outline:none;border-color:#1976d2}

/* ── Buttons ── */
.btn{padding:6px 14px;border-radius:4px;border:1px solid #ccc;background:#fff;
     font-size:13px;cursor:pointer;font-weight:500;transition:background .15s}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#1976d2;color:#fff;border-color:#1565c0}
.btn-primary:hover{background:#1565c0}
.btn-success{background:#2e7d32;color:#fff;border-color:#1b5e20}
.btn-success:hover{background:#1b5e20}
.btn-sm{padding:3px 9px;font-size:12px}
.btn-danger{background:#c62828;color:#fff;border-color:#b71c1c}
.btn-ghost{background:transparent;border-color:#ddd;color:#555}
.btn-ghost:hover{background:#f0f0f0}

/* ── Badges ── */
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;display:inline-block}
.b-ok{background:#e8f5e9;color:#2e7d32}
.b-err{background:#ffebee;color:#c62828}
.b-warn{background:#fff8e1;color:#e65100}
.b-info{background:#e3f2fd;color:#1565c0}
.b-run{background:#e3f2fd;color:#1565c0}

/* ── Log ── */
.log{background:#1e1e1e;color:#d4d4d4;border-radius:6px;padding:1rem;
     font-family:monospace;font-size:12px;height:340px;overflow-y:auto;
     white-space:pre-wrap;line-height:1.55}
.log .l-ok{color:#4ec9b0}
.log .l-changed{color:#ce9178}
.log .l-err{color:#f44747}
.log .l-play{color:#569cd6;font-weight:bold}
.log .l-skip{color:#808080}

/* ── Status dots ── */
.dot{width:10px;height:10px;border-radius:50%;background:#ddd;flex-shrink:0;display:inline-block}
.dot.ok{background:#4caf50}
.dot.running{background:#2196f3;animation:pulse 1s infinite}
.dot.error{background:#f44336}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Info boxes ── */
.warn-box{background:#fff8e1;border:1px solid #ffe082;border-radius:6px;
          padding:7px 12px;font-size:12px;color:#5d4037;margin-top:5px}
.info-box{background:#e3f2fd;border:1px solid #90caf9;border-radius:6px;
          padding:7px 12px;font-size:12px;color:#0d47a1;margin-top:8px}

/* ── Misc ── */
.mono{font-family:monospace;font-size:12px;background:#f5f5f5;
      padding:2px 6px;border-radius:3px;word-break:break-all}
.node-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.node-row input{flex:1;min-width:0}
.check-row{font-size:12px;padding:2px 0}
.check-ok{color:#2e7d32}
.check-fail{color:#c62828}
.outputs-grid{display:grid;grid-template-columns:170px 1fr;
              gap:6px 12px;font-size:12px;margin-top:.5rem}
.outputs-grid .ok{color:#2e7d32;font-weight:500}
.phase-list{list-style:none}
.phase-list li{display:flex;align-items:center;gap:10px;padding:7px 0;
               border-bottom:1px solid #f0f0f0;font-size:13px}
.phase-list li:last-child{border-bottom:none}

/* ── Summary card ── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.75rem}
.summary-item{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:6px;
              padding:.75rem 1rem}
.summary-item .s-label{font-size:11px;color:#888;margin-bottom:.3rem}
.summary-item .s-value{font-size:13px;font-weight:500;color:#1565c0;
                        font-family:monospace;word-break:break-all}
.summary-item .s-status{font-size:11px;color:#2e7d32;margin-top:.2rem}

/* ── Stepper — clearer completion states ── */
.step.done{
  color:#2e7d32;
  background:#e8f5e9;
  border-radius:20px;
}
.step.done .step-num{
  background:#2e7d32;
  color:#fff;
}
.step.done::after{
  content:' ✓';
  font-size:11px;
}
.step.error{
  color:#c62828;
  background:#ffebee;
  border-radius:20px;
}
.step.error .step-num{background:#f44336;color:#fff}

/* ── Button success flash ── */
.btn-flash-ok{
  background:#2e7d32 !important;
  border-color:#1b5e20 !important;
  color:#fff !important;
  transition:background .3s;
}

/* ── Card hint — consistent style ── */
.card-hint{
  font-size:12px;
  color:#555;
  line-height:1.65;
  background:#f5f8ff;
  border-left:3px solid #90caf9;
  padding:.5rem .75rem;
  border-radius:0 4px 4px 0;
  margin-bottom:.9rem;
}

</style>
