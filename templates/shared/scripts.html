<script>
/* ── Tab order for the numbered setup flow ── */
const STEP_ORDER = [
  'bootstrap','configure','kubernetes','gitlab','jupyterhub','admindashboard'
];

/* ── Show a tab, hide all others ── */
function showTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
  const stepEl = document.getElementById('step-' + name);
  if (stepEl) stepEl.classList.add('active');
  if (name === 'configure')  { if (typeof loadBootstrappedNodes === 'function') loadBootstrappedNodes(); }
  if (name === 'reset')      loadResetPreview();
  if (name === 'status')     refreshPlatformOverview();
  if (name === 'gitlab')     { if (typeof loadGitLabOutputs   === 'function') loadGitLabOutputs(); }
  if (name === 'gitlab-connect') { if (typeof gcLoadOutputs === 'function') gcLoadOutputs(); }
  if (name === 'jupyterhub') { if (typeof loadJhubPrefill     === 'function') loadJhubPrefill(); }
  if (name === 'workers')    { if (typeof loadWorkerNodes     === 'function') loadWorkerNodes(); }
  if (name === 'extensions') {
    if (typeof loadGpuStatus    === 'function') loadGpuStatus();
    if (typeof loadGpuVersions  === 'function') loadGpuVersions();
    if (typeof loadPrereqNodes  === 'function') loadPrereqNodes();
  }
  if (name === 'monitoring') { if (typeof loadMonitoringStatus === 'function') loadMonitoringStatus(); }
  if (name === 'kyverno') {
    if (typeof loadKyvernoStatus   === 'function') loadKyvernoStatus();
    if (typeof loadKyvernoVersions  === 'function') loadKyvernoVersions();
    if (typeof loadKyvernoPolicies === 'function') loadKyvernoPolicies();
    if (typeof loadNodeSelectorStatus === 'function') loadNodeSelectorStatus();
  }
  if (name === 'admindashboard') { if (typeof checkDashPrereq === 'function') checkDashPrereq(); }
  checkPrereqs(name);
}

/* ── Step state persistence ── */
function markStepDone(name) {
  const el = document.getElementById('step-' + name);
  if (el) { el.classList.add('done'); el.classList.remove('error','active'); }
  localStorage.setItem('step-' + name, 'done');
}
function markStepError(name) {
  const el = document.getElementById('step-' + name);
  if (el) { el.classList.add('error'); el.classList.remove('done'); }
  localStorage.setItem('step-' + name, 'error');
}
function restoreStepStates() {
  STEP_ORDER.forEach(name => {
    const state = localStorage.getItem('step-' + name);
    if (state === 'done')  markStepDone(name);
    if (state === 'error') markStepError(name);
  });
}

/* ── Show a "continue to next step" CTA card ── */
function showNextStep(id) {
  const el = document.getElementById('next-step-' + id);
  if (el) el.classList.add('visible');
}

/* ── Auto-recover step states from live platform on page load ── */
async function autoRecoverSteps() {
  // If inventory/vars files exist → bootstrap + configure were already completed
  try {
    const r = await fetch('/api/configure/preview');
    if (r.ok) {
      if (!localStorage.getItem('step-bootstrap')) markStepDone('bootstrap');
      if (!localStorage.getItem('step-configure')) markStepDone('configure');
    }
  } catch(e) {}
  // Check live platform status for the remaining steps
  try {
    const r = await fetch('/api/platform/status');
    const d = await r.json();
    const map = {
      kubernetes:     d.cluster?.status    === 'ready',
      gitlab:         d.gitlab?.status     === 'ready',
      jupyterhub:     d.jupyterhub?.status === 'ready',
      admindashboard: d.dashboard?.status  === 'ready',
    };
    Object.entries(map).forEach(([name, ready]) => {
      if (ready && !localStorage.getItem('step-' + name)) markStepDone(name);
    });
  } catch(e) {}
}

/* ── Prereq banners ── */
async function checkPrereqs(tabName) {
  // Only GitLab tab still uses the generic showBanner pattern.
  // All other tabs own their own always-visible prereq banners.
  if (tabName === 'gitlab') {
    try {
      const r = await fetch('/api/configure/preview');
      showBanner('prereq-gitlab', r.status === 404,
        '⚠ Generate cluster configuration first before deploying GitLab. ' +
        '<a onclick="showTab(\'configure\',document.getElementById(\'step-configure\'))" ' +
        'style="color:#1565c0;cursor:pointer;text-decoration:underline">Go to Configure tab →</a>');
    } catch(e) {}
  }
}

function showBanner(id, visible, html) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = html;
  el.style.display = visible ? 'flex' : 'none';
}

/* ── Button success flash ── */
function btnSuccess(btn, label) {
  label = label || '✓ Done';
  const orig = btn.textContent;
  btn.textContent = label;
  btn.classList.add('btn-flash-ok');
  setTimeout(() => {
    btn.textContent = orig;
    btn.classList.remove('btn-flash-ok');
  }, 2000);
}

/* ── Log helpers ── */
function makeLogLine(text, logEl) {
  const s = document.createElement('span');
  if (text.startsWith('PLAY'))               s.className = 'l-play';
  else if (/ok:/.test(text))                 s.className = 'l-ok';
  else if (/changed:/.test(text))            s.className = 'l-changed';
  else if (/FAILED|ERROR|fatal/.test(text))  s.className = 'l-err';
  else if (/skipping/.test(text))            s.className = 'l-skip';
  s.textContent = text + '\n';
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}

function setDot(id, state) {
  const el = document.getElementById(id);
  if (el) el.className = 'dot ' + (state || '');
}

function streamToLog(url, dotId, logElId) {
  const logEl = document.getElementById(logElId);
  logEl.innerHTML = '';
  setDot(dotId, 'running');
  const es = new EventSource(url);
  es.onmessage = e => {
    if (e.data === '__DONE__') {
      setDot(dotId, 'ok'); es.close();
    } else if (e.data.startsWith('__ERROR__')) {
      setDot(dotId, 'error');
      makeLogLine('FAILED — exit code: ' + e.data.split(':')[1], logEl);
      es.close();
    } else {
      makeLogLine(e.data, logEl);
    }
  };
  es.onerror = () => { setDot(dotId, 'error'); es.close(); };
  return es;
}

function renderChecks(elId, checks) {
  if (!checks) return;
  document.getElementById(elId).innerHTML = Object.entries(checks).map(([k, v]) => {
    const ok = !v.startsWith('FAIL');
    return `<div class="check-row ${ok ? 'check-ok' : 'check-fail'}" style="margin:3px 0">
      ${ok ? '✓' : '✗'} <strong>${k}</strong>: ${v}</div>`;
  }).join('');
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Platform overview (Status tab) ── */
async function refreshPlatformOverview() {
  const el = document.getElementById('platform-overview');
  if (!el) return;
  el.innerHTML = '<span style="color:#888;font-size:13px">Checking...</span>';
  try {
    const [platformResp, monitoringResp] = await Promise.all([
      fetch('/api/platform/status'),
      fetch('/api/monitoring/access').catch(() => null),
    ]);
    const d = await platformResp.json();
    let monitoring = { grafana_url: null, prometheus_url: null };
    if (monitoringResp && monitoringResp.ok) {
      monitoring = await monitoringResp.json();
    }

    if (d.cluster?.status    === 'ready') markStepDone('kubernetes');
    if (d.gitlab?.status     === 'ready') markStepDone('gitlab');
    if (d.jupyterhub?.status === 'ready') markStepDone('jupyterhub');
    if (d.dashboard?.status  === 'ready') markStepDone('admindashboard');

    d.grafana = {
      status: monitoring.grafana_url ? 'ready' : 'not_deployed',
      url: monitoring.grafana_url,
    };
    d.prometheus = {
      status: monitoring.prometheus_url ? 'ready' : 'not_deployed',
      url: monitoring.prometheus_url,
    };

    const LABELS = {
      cluster:    { label: 'Kubernetes Cluster', icon: '⎈' },
      longhorn:   { label: 'Longhorn Storage',   icon: '💾' },
      gitlab:     { label: 'GitLab',             icon: '🦊' },
      jupyterhub: { label: 'JupyterHub',         icon: '📓' },
      dashboard:  { label: 'Admin Dashboard',    icon: '⚙' },
      grafana:    { label: 'Grafana',            icon: '📊' },
      prometheus: { label: 'Prometheus',         icon: '🔭' },
    };

    const rows = Object.entries(LABELS).map(([key, meta]) => {
      const comp    = d[key] || { status: 'unknown' };
      const isReady = comp.status === 'ready';
      const isError = comp.status === 'error';
      const badge   = isReady ? 'b-ok' : (isError ? 'b-err' : 'b-warn');
      const label   = isReady ? 'ready' : (isError ? 'error' : 'not deployed');
      const urlPart = comp.url
        ? `<a href="${comp.url}" target="_blank" style="color:#1976d2;font-size:12px;margin-left:8px">${comp.url}</a>`
        : '';
      let extra = '';
      if (key === 'cluster' && comp.node_count > 0)
        extra = `<span style="font-size:12px;color:#888;margin-left:8px">${comp.node_count} node(s)</span>`;
      if ((key === 'longhorn' || key === 'jupyterhub') && comp.pods_running > 0)
        extra = `<span style="font-size:12px;color:#888;margin-left:8px">${comp.pods_running} pod(s)</span>`;
      return `<div style="display:flex;align-items:center;gap:10px;padding:.6rem 0;border-bottom:1px solid #f0f0f0">
        <span style="font-size:16px">${meta.icon}</span>
        <span style="min-width:160px;font-size:13px;font-weight:500">${meta.label}</span>
        <span class="badge ${badge}" style="min-width:80px;text-align:center">${label}</span>
        ${urlPart}${extra}</div>`;
    });
    el.innerHTML = rows.join('');
  } catch(e) {
    el.innerHTML = '<span class="badge b-warn">Could not reach launcher API</span>';
  }
}

function populateUrl(elId, url) {
  const el = document.getElementById(elId);
  if (el && url)
    el.innerHTML = `<a href="${url}" target="_blank" style="color:#1976d2">${url}</a>`;
}

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', () => {
  restoreStepStates();
  showTab('bootstrap', document.getElementById('step-bootstrap'));
  autoRecoverSteps();
});
</script>
