apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-gpu-node-selector
  annotations:
    policies.kyverno.io/title: "GPU pods must declare accelerator=nvidia nodeSelector"
    policies.kyverno.io/description: >
      Any pod requesting nvidia.com/gpu must also declare
      nodeSelector: accelerator: nvidia. This is a cluster-level
      infrastructure invariant — not admin-configurable.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
  - name: require-accelerator-node-selector
    match:
      any:
      - resources:
          kinds: [Pod]
    preconditions:
      all:
      - key: "{{ request.object.spec.containers[].resources.limits.\"nvidia.com/gpu\" || '0' }}"
        operator: GreaterThan
        value: "0"
    validate:
      message: >
        Pods requesting nvidia.com/gpu must declare
        nodeSelector: accelerator: nvidia. Add this to the pod spec.
      pattern:
        spec:
          nodeSelector:
            accelerator: nvidia
