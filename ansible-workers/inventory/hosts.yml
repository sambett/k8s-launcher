# ansible-workers/inventory/hosts.yml
# Reference inventory for standalone manual use.
# The launcher generates a temporary inventory at runtime — this file
# is never used by the launcher directly.

all:
  children:
    control_plane:
      hosts:
        REPLACE_WITH_CP_HOSTNAME:
          ansible_host: "REPLACE_WITH_CP_IP"
          ansible_user: "REPLACE_WITH_CP_USER"
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
          ansible_python_interpreter: /usr/bin/python3

    workers:
      hosts:
        REPLACE_WITH_WORKER_HOSTNAME:
          ansible_host: "REPLACE_WITH_WORKER_IP"
          ansible_user: "REPLACE_WITH_WORKER_USER"
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
          ansible_python_interpreter: /usr/bin/python3
