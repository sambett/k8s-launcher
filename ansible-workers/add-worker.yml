---
# ansible-workers/add-worker.yml
# Adds a new worker node to a running cluster.
# Called by routes/worker.py after Paramiko SSH bootstrap completes.
#
# Usage (via launcher — do not run manually):
#   ansible-playbook -i /tmp/worker-add-<hostname>.ini add-worker.yml
#   --extra-vars @generated/group_vars/all.yml
#   --extra-vars "join_command=<kubeadm join ...>"
#   --extra-vars "gitlab_registry_host=<ip:port>"   # optional

# -- Play 1: generate a fresh join token on the control plane -----------------
# Python passes the join_command as --extra-vars so this play is skipped.
# The token is generated by Python via run_on_cp before calling this playbook.
# This play exists only for standalone/manual use.

# -- Play 2: configure the new worker and join the cluster --------------------
- name: Configure new worker node and join cluster
  hosts: workers
  become: yes
  roles:
    - worker_add
