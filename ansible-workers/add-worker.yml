---
# ansible-workers/add-worker.yml
#
# Entry point for adding a new worker node to a running cluster.
# Called by routes/worker.py after the Paramiko SSH bootstrap completes.
#
# This playbook is the equivalent of site.yml in other Ansible projects —
# it does not contain any tasks itself. It only declares which hosts to
# target and which roles to run, and in what order.
#
# Role execution order is intentional and must not be changed:
#
#   1. node_prep
#      OS-level preparation: base packages, /etc/hosts, swap, kernel
#      modules, sysctl. Must run first — everything else depends on a
#      clean, correctly configured OS.
#
#   2. longhorn_prereqs
#      Storage OS prerequisites: iscsi_tcp, cryptsetup, multipathd.
#      Must run before join so Longhorn's DaemonSet pod can function
#      the moment it is scheduled on the newly Ready node.
#
#   3. containerd
#      Container runtime: install, config.toml, GitLab registry config.
#      Must run before Kubernetes packages because kubelet depends on
#      containerd being present and correctly configured at start time.
#
#   4. kubernetes_packages
#      kubelet and kubeadm at the pinned cluster version.
#      Must run before join — kubeadm join requires both to be installed.
#
#   5. worker_join
#      Stale state cleanup, kubeadm join, node name resolution, labels.
#      Runs last because it depends on everything above being in place.
#
# Usage (via launcher — do not run manually):
#   ansible-playbook -i /tmp/worker-add-<hostname>.ini add-worker.yml
#     --extra-vars @generated/group_vars/all.yml
#     --extra-vars "join_command=<kubeadm join ...>"
#     --extra-vars "gitlab_registry_host=<ip:port>"   # optional

- name: Configure new worker node and join cluster
  hosts: workers
  become: yes
  roles:
    - node_prep
    - longhorn_prereqs
    - containerd
    - kubernetes_packages
    - worker_join
