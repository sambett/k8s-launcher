---
# worker_remove/tasks/main.yml
# Drains and removes a worker node from the cluster, then cleans up the VM.
# Called by ansible-workers/remove-worker.yml.
# target_hostname is passed as --extra-vars from Python.

# -- Cluster-side operations --------------------------------------------------

- name: Cordon node to prevent new pod scheduling
  command: kubectl cordon {{ target_hostname }}
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no
  changed_when: true

- name: Drain all pods from node
  command: >
    kubectl drain {{ target_hostname }}
    --ignore-daemonsets
    --delete-emptydir-data
    --force
    --timeout=300s
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no
  changed_when: true

- name: Delete node from Kubernetes
  command: kubectl delete node {{ target_hostname }}
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no
  changed_when: true

- name: Remove Longhorn node entry
  command: >
    kubectl delete node.longhorn.io {{ target_hostname }}
    -n longhorn-system --ignore-not-found
  delegate_to: "{{ groups['control_plane'][0] }}"
  become: no
  changed_when: false
  ignore_errors: yes

# -- VM-side cleanup ----------------------------------------------------------

- name: Stop kubelet service
  systemd:
    name: kubelet
    state: stopped
  ignore_errors: yes

- name: Disable kubelet service
  systemd:
    name: kubelet
    enabled: no
  ignore_errors: yes

- name: Run kubeadm reset
  command: kubeadm reset -f
  ignore_errors: yes
  changed_when: true

- name: Clean up Kubernetes and CNI directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/kubernetes
    - /var/lib/kubelet
    - /etc/cni/net.d
    - /var/lib/etcd
  ignore_errors: yes
