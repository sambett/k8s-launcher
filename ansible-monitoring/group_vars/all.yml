---
# ansible-monitoring/group_vars/all.yml
#
# Static configuration for the monitoring stack.
# chart_version, dcgm_version, and deploy_dcgm are NOT set here —
# they are injected at runtime by k8s-launcher via --extra-vars.

monitoring_namespace: monitoring
grafana_nodeport:     32300
prometheus_nodeport:  32301

# DCGM Exporter
dcgm_namespace:    monitoring
dcgm_metrics_port: 9400

# nodeSelector used to identify GPU nodes for the DCGM DaemonSet.
#
# Why this is a variable and not hardcoded:
#   nvidia.com/gpu.present=true was written by old GFD (NVDP < 0.14).
#   Newer NVDP/GFD versions dropped that label. Exposing key+value here
#   lets you fix this in one place without touching the DaemonSet template.
#
# How to find the right label for your cluster:
#   kubectl get node <gpu-node> --show-labels | tr ',' '\n' | grep nvidia
#   Pick a label with a fixed string value, present on GPU nodes, absent on CPU nodes.
#
# Modern NVDP (>= 0.14) — use one of:
#   nvidia.com/gpu.mode = compute       <- default, correct for compute clusters
#   nvidia.com/mig.capable = "false"    <- alternative if gpu.mode is absent
#
# Old NVDP (< 0.14):
#   nvidia.com/gpu.present = "true"
dcgm_node_selector_key:   nvidia.com/gpu.mode
dcgm_node_selector_value: "compute"