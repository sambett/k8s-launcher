---
# ansible-monitoring/roles/prometheus_stack/tasks/main.yml
#
# Installs or upgrades kube-prometheus-stack via Helm.
#
# This role does NOT build Prometheus from scratch.
# It calls `helm upgrade --install` which lets the chart do the heavy lifting:
#   - deploying Prometheus, Alertmanager, Grafana, Prometheus Operator,
#     kube-state-metrics, and node-exporter as Kubernetes workloads
#   - creating all required CRDs, RBAC rules, and ServiceAccounts
#   - managing upgrades and rollbacks through Helm's revision history
#
# Our job here is:
#   1. Ensure the namespace exists
#   2. Ensure the Helm repo is present and up to date
#   3. Render our customisation values (NodePorts, optional GPU config)
#   4. Call helm upgrade --install with those values
#   5. Verify the core deployments came up
#
# chart_version must come from --extra-vars at runtime (set by k8s-launcher).

- name: Validate chart_version is defined
  fail:
    msg: >
      chart_version must be passed as --extra-vars.
      Example: --extra-vars 'chart_version=65.1.0'
  when: chart_version is not defined or chart_version == ""

- name: Create monitoring namespace (idempotent)
  shell: >
    kubectl create namespace {{ monitoring_namespace }}
    --dry-run=client -o yaml | kubectl apply -f -
  changed_when: false

- name: Add prometheus-community Helm repository
  command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  register: repo_add
  changed_when: "'already exists' not in repo_add.stdout"
  failed_when: repo_add.rc != 0 and 'already exists' not in repo_add.stdout

- name: Update Helm repositories
  command: helm repo update
  changed_when: true

# Pre-flight: detect a genuinely stuck Helm release before running upgrade.
# We intentionally reduce Helm's JSON output to a single plain status string
# inside the shell step so Ansible never has to parse uncertain JSON during
# templating on first install / empty output paths.
- name: Pre-flight - read Helm release status safely
  shell: |
    out="$(helm status kube-prometheus-stack \
      --namespace {{ monitoring_namespace }} \
      --output json 2>/dev/null || true)"

    if [ -z "$out" ]; then
      echo "not_installed"
    else
      python3 -c 'import json, sys
data = sys.stdin.read().strip()
print(json.loads(data).get("info", {}).get("status", "not_installed"))' <<< "$out" 2>/dev/null \
      || echo "invalid"
    fi
  register: helm_release_status
  changed_when: false

- name: Fail clearly if Helm release is locked
  vars:
    release_status: "{{ helm_release_status.stdout | trim | default('not_installed') }}"
  fail:
    msg: |
      ----------------------------------------------------------------
      Helm release 'kube-prometheus-stack' is currently in state:
        {{ release_status }}

      This means another install or upgrade operation is already in
      progress (or a previous run was interrupted and left a lock).

      What to do:
        1. Wait a few minutes - if a legitimate upgrade is still
           running, it will complete and the lock will clear.
        2. Re-run this playbook. Do not run it a second time while
           the first is still streaming.

      If the release is genuinely stuck (e.g. after a network drop):
        Run: helm history kube-prometheus-stack -n monitoring
        If the last revision shows 'pending-*' and nothing is running,
        inspect the Helm secrets in the monitoring namespace and clear
        the stuck revision manually before retrying.
      ----------------------------------------------------------------
  when: release_status in ['pending-install', 'pending-upgrade', 'pending-rollback']

- name: Render Helm values from template
  template:
    src: values.yaml.j2
    dest: /tmp/monitoring-values.yaml
    mode: '0644'

- name: Install kube-prometheus-stack {{ chart_version }} via Helm
  command: >
    helm upgrade --install kube-prometheus-stack
    prometheus-community/kube-prometheus-stack
    --namespace {{ monitoring_namespace }}
    --version {{ chart_version }}
    -f /tmp/monitoring-values.yaml
    --timeout 10m
    --wait
    --atomic
  register: helm_result
  changed_when: true

- name: Wait for Grafana deployment to be ready
  command: >
    kubectl rollout status deployment
    kube-prometheus-stack-grafana
    -n {{ monitoring_namespace }} --timeout=300s
  changed_when: false

- name: Wait for Prometheus operator to be ready
  command: >
    kubectl rollout status deployment
    kube-prometheus-stack-operator
    -n {{ monitoring_namespace }} --timeout=300s
  changed_when: false
